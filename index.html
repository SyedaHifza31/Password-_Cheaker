<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Password Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="header">
<h1>▓▒░ CYBER SECURITY ANALYZER ░▒▓</h1>
</div>


<div class="section">

<label>ENTER PASSWORD</label>

<input type="password" id="password">
<div class="toggle">
<input type="checkbox" id="show">
Reveal Password
</div>

</div>
<div class="section">

<div class="meter">

<div class="bar" id="bar"></div>

<div class="percent" id="percent">0%</div>

</div>

<div class="result" id="result">
ENTER PASSWORD
</div>

</div>


<div class="section checklist">

<div id="r1">✗ Minimum 8 characters</div>
<div id="r2">✗ Uppercase letter</div>
<div id="r3">✗ Lowercase letter</div>
<div id="r4">✗ Number</div>
<div id="r5">✗ Special character</div>

</div>


<div class="section instructions">

<strong>SECURITY INSTRUCTIONS:</strong><br>
Use at least 8 characters<br>
Mix uppercase and lowercase letters<br>
Include numbers and symbols<br>
Avoid common passwords

</div>

</div>

<script src="script.js"></script>
</body>
</html>
